<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ficha de Inscrição</title>
</head>

<body>

<h2 align="center">Ficha de Inscrição</h2>

<form>

<table align="center" border="1" cellpadding="8">

<tr>
<td>Nome do candidato:</td>
<td colspan="5">
<input type="text" name="nome" size="70">
</td>
</tr>

<tr>
<td>Endereço:</td>
<td colspan="5">
<input type="text" name="endereco" size="70">
</td>
</tr>

<tr>
<td>CEP:</td>
<td><input type="text" name="cep"></td>

<td>Cidade:</td>
<td>
<select name="cidade">
<option>-- Cidade --</option>
<option>São Paulo</option>
<option>Rio de Janeiro</option>
<option>Belo Horizonte</option>
<option>Brasilia</option>
</select>
</td>

<td>UF:</td>
<td>
<select name="uf">
<option>-- UF --</option>
<option>SP</option>
<option>RJ</option>
<option>MG</option>
<option>DF</option>
</select>
</td>
</tr>

<tr>
<td>Telefone:</td>
<td><input type="text" name="tel1"></td>
<td><input type="text" name="tel2"></td>
<td><input type="text" name="tel3"></td>
<td></td>
<td></td>
</tr>

<tr>
<td>RG:</td>
<td><input type="text" name="rg"></td>

<td>CPF:</td>
<td><input type="text" name="cpf"></td>

<td>Sexo:</td>
<td>
<input type="radio" name="sexo"> Mas.
<input type="radio" name="sexo"> Fem.
</td>
</tr>

<tr>
<td>Escolaridade:</td>
<td>
<select name="escolaridade">
<option>-- Selecione --</option>
<option>Ensino Médio</option>
<option>Superior</option>
<option>Pós Graduação</option>
</select>
</td>

<td>Email:</td>
<td colspan="3">
<input type="email" name="email" size="40">
</td>
</tr>

<tr>
<td>Curso:</td>
<td>
<select name="curso">
<option>-- Selecione --</option>
<option>Informática</option>
<option>Administração</option>
<option>Engenharia</option>
</select>
</td>

<td>Senha de acompanhamento:</td>
<td colspan="3">
<input type="password" name="senha">
</td>
</tr>

<tr>
<td colspan="6" align="center">
<br><br>
<input type="submit" value="CADASTRAR">
</td>
</tr>

</table>

</form>

</body>
</html>
